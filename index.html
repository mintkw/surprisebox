<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'"/>
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'"/>

    <link rel="stylesheet" href="./style.css">
    
    <script src="./renderer.js" defer></script>

    <title>Surprisebox</title>
    
  </head>
  <body>
    <!-- Display a random piece of stored text -->
     <div id="display-text"></div>
     <button id="draw-button">Draw</button>
     <button id="delete-button">Delete</button>
    
    <!-- Save new text -->
     <label for="new-text">Text: </label>
     <input type="text" id="new-text">
     <label for="new-author">Author: </label>
     <input type="author" id="new-author">
     <button id="save-button">Save</button>

  </body>
</html>
